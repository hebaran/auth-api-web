<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../assets/images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../../styles/reset.css">
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="./login.css">
    <title>Vunoa &middot; Login</title>
</head>
<body>
    <div class="container">
        <header>
            <img id="header-logo" src="../../assets/images/logo-black.png" alt="Logo Vunoa">
            <h1>Entre no Vunoa</h1>
        </header>
        <main>
            <form>
                <div class="input-container">
                    <label for="identifier">Nome de usuário ou e-mail</label>
                    <input type="text" id="identifier">
                </div>
                <div class="input-container">
                    <div class="header-password-container">
                        <label for="password">Senha</label>
                        <a href="#">Esqueceu sua senha?</a>
                    </div>
                    <input type="password" id="password">
                </div>
            </form>
        </main>
        <footer>
        </footer>
    </div>
</body>
</html>
