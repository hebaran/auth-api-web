<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="shortcut icon" href="assets/icon/vunoa-icon.png" type="image/x-icon">
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="container">
        <section class="login-area">
            <section>
                <img class="vunoa-logo" src="assets/logo/vunoa-logo.png" alt="Logotipo Branca Vunoa">
                <h1>Entrar na Vunoa</h1>
            </section>
            <form>
                <div class="input-group">
                    <label for="username-email">Nome de usuário ou e-mail</label>
                    <input type="text" name="username-email" id="username-email">
                </div>
                <div class="input-group">
                    <label for="username-email">Senha</label>
                    <input type="password" name="password" id="password">
                </div>
                <button class="input-group" class="buttons" id="button-sigin">Entrar</button>
            </form>
        <section>
    </div>
</body>
</html>
